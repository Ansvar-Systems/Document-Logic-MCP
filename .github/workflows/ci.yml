name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tesseract-ocr poppler-utils

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run linter
        run: ruff check src/ tests/

      - name: Run type checker
        run: mypy src/document_logic_mcp/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short -x

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t document-logic-mcp:test .

      - name: Verify container starts
        run: |
          docker run -d --name test-container -p 3000:3000 document-logic-mcp:test
          sleep 5
          curl -sf http://localhost:3000/health | grep -q '"status"'
          docker stop test-container
